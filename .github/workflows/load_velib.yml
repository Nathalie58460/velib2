name: Load Velib JSON into Snowflake

on:
  workflow_dispatch:

jobs:
  load-json:
    runs-on: ubuntu-latest
    env:
      VELIB_URL: "https://velib-metropole-opendata.smovengo.cloud/opendata/Velib_Metropole/station_information.json"
      # Connexion Snowflake
      SNOW_ACCOUNT:    ${{ secrets.SNOWSQL_ACCOUNT }}     # ex: xy12345.eu-west-1
      SNOW_USER:       ${{ secrets.SNOWSQL_USER }}
      SNOW_PASSWORD:   ${{ secrets.SNOWSQL_PWD }}
      SNOW_ROLE:       ${{ secrets.SNOWSQL_ROLE }}
      SNOW_WAREHOUSE:  ${{ secrets.SNOWSQL_WAREHOUSE }}
      SNOW_DATABASE:   ${{ secrets.SNOWSQL_DB }}
      SNOW_SCHEMA:     ${{ secrets.SNOWSQL_SCHEMA }}
      # dbt Cloud
      DBT_API_KEY:     ${{ secrets.DBT_API_KEY }}
      DBT_ACCOUNT_ID:  ${{ secrets.DBT_ACCOUNT_ID }}
      DBT_JOB_ID:      ${{ secrets.DBT_JOB_ID }}

    steps:
      - name: Download Vélib JSON
        run: curl -fSL -o station_information.json "$VELIB_URL"

      # Installe le Snowflake CLI (action officielle)
      - name: Setup Snowflake CLI
        uses: snowflake-labs/snowflake-cli-action@v1
        with:
          cli-version: latest

      # Exécute un PUT via le Snowflake CLI (commande SQL)
      - name: Upload file to @VELIB_STAGE via Snowflake CLI
        env:
          SNOWFLAKE_ACCOUNT:   ${{ env.SNOW_ACCOUNT }}
          SNOWFLAKE_USER:      ${{ env.SNOW_USER }}
          SNOWFLAKE_PASSWORD:  ${{ env.SNOW_PASSWORD }}
          SNOWFLAKE_ROLE:      ${{ env.SNOW_ROLE }}
          SNOWFLAKE_WAREHOUSE: ${{ env.SNOW_WAREHOUSE }}
          SNOWFLAKE_DATABASE:  ${{ env.SNOW_DATABASE }}
          SNOWFLAKE_SCHEMA:    ${{ env.SNOW_SCHEMA }}
        run: |
          snow sql -q "PUT file://$(pwd)/station_information.json @VELIB_STAGE auto_compress=false OVERWRITE=true"

      - name: Trigger dbt Cloud Job
        run: |
          curl -fSL -X POST \
            -H "Authorization: Token ${DBT_API_KEY}" \
            -H "Content-Type: application/json" \
            "https://cloud.getdbt.com/api/v2/accounts/${DBT_ACCOUNT_ID}/jobs/${DBT_JOB_ID}/run/"
``
