name: Load Velib JSON into Snowflake

on:
  workflow_dispatch:

jobs:
  load-json:
    runs-on: ubuntu-latest

    env:
      VELIB_URL: "https://velib-metropole-opendata.smovengo.cloud/opendata/Velib_Metropole/station_information.json"

      SNOWSQL_ACCOUNT: ${{ secrets.SNOWSQL_ACCOUNT }}
      SNOWSQL_USER: ${{ secrets.SNOWSQL_USER }}
      SNOWSQL_PWD: ${{ secrets.SNOWSQL_PWD }}
      SNOWSQL_ROLE: ${{ secrets.SNOWSQL_ROLE }}
      SNOWSQL_WAREHOUSE: ${{ secrets.SNOWSQL_WAREHOUSE }}
      SNOWSQL_DB: ${{ secrets.SNOWSQL_DB }}
      SNOWSQL_SCHEMA: ${{ secrets.SNOWSQL_SCHEMA }}

      DBT_API_KEY: ${{ secrets.DBT_API_KEY }}
      DBT_ACCOUNT_ID: ${{ secrets.DBT_ACCOUNT_ID }}
      DBT_JOB_ID: ${{ secrets.DBT_JOB_ID }}

    steps:
      - name: Install SnowSQL
        run: |
          curl -fSL https://sfc-repo.snowflakecomputing.com/snowsql/bootstrap/1.4/linux_x86_64/snowsql-1.4.5-linux_x86_64.bash -o snowsql.bash
          SNOWSQL_DEST=/usr/local/bin bash snowsql.bash
          snowsql -v

      - name: Download Velib JSON
        run: curl -fSL -o station_information.json "$VELIB_URL"

      - name: Upload to Snowflake Stage (PUT)
        run: |
          snowsql \
            -a $SNOWSQL_ACCOUNT \
            -u $SNOWSQL_USER \
            -p $SNOWSQL_PWD \
            -r $SNOWSQL_ROLE \
            -w $SNOWSQL_WAREHOUSE \
            -d $SNOWSQL_DB \
            -s $SNOWSQL_SCHEMA \
            -q "PUT file://$(pwd)/station_information.json @VELIB_STAGE auto_compress=false OVERWRITE=true"

      - name: Trigger dbt Cloud Job
        run: |
          curl -fSL -X POST \
            -H "Authorization: Token ${DBT_API_KEY}" \
            -H "Content-Type: application/json" \
            "https://cloud.getdbt.com/api/v2/accounts/${DBT_ACCOUNT_ID}/jobs/${DBT_JOB_ID}/run/"
